<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svg tag</title>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>

    <linearGradient id="jersey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8102e"/>
      <stop offset="100%" stop-color="#6d0019"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bg)"/>

  <!-- Stadium lights -->
  <g opacity="0.2">
    <circle cx="150" cy="90" r="90" fill="#ffffff"/>
    <circle cx="850" cy="90" r="90" fill="#ffffff"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="500" width="1000" height="100" fill="#1e5f2a"/>

  <!-- Title -->
  <text x="500" y="90"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="60"
        font-weight="bold"
        fill="url(#gold)">
    RCB PLAYERS
  </text>

  <!-- Player 1 -->
  <g transform="translate(260,170)">
    <circle cx="0" cy="0" r="40" fill="#f1c27d"/>
    <rect x="-45" y="45" width="90" height="130" rx="12" fill="url(#jersey)"/>
    <line x1="-45" y1="70" x2="-90" y2="130" stroke="#f1c27d" stroke-width="14"/>
    <line x1="45" y1="70" x2="90" y2="130" stroke="#f1c27d" stroke-width="14"/>
    <line x1="-20" y1="175" x2="-30" y2="260" stroke="#f1c27d" stroke-width="16"/>
    <line x1="20" y1="175" x2="30" y2="260" stroke="#f1c27d" stroke-width="16"/>
    <text x="0" y="125" text-anchor="middle" fill="#ffd700"
          font-size="28" font-family="Arial">18</text>
  </g>

  <!-- Player 2 (Captain pose) -->
  <g transform="translate(500,140)">
    <circle cx="0" cy="0" r="45" fill="#f1c27d"/>
    <rect x="-55" y="50" width="110" height="160" rx="14" fill="url(#jersey)"/>
    <line x1="-55" y1="80" x2="-120" y2="40" stroke="#f1c27d" stroke-width="15"/>
    <line x1="55" y1="80" x2="130" y2="20" stroke="#f1c27d" stroke-width="15"/>
    <line x1="-25" y1="210" x2="-35" y2="320" stroke="#f1c27d" stroke-width="18"/>
    <line x1="25" y1="210" x2="35" y2="320" stroke="#f1c27d" stroke-width="18"/>

    <!-- Bat -->
    <rect x="120" y="-40" width="18" height="160" fill="#8b5a2b"
          transform="rotate(-20 120 -40)"/>
    <rect x="95" y="-90" width="60" height="70" rx="6"
          fill="#e6c27a" stroke="#8b5a2b" stroke-width="2"
          transform="rotate(-20 95 -90)"/>

    <text x="0" y="145" text-anchor="middle" fill="#ffd700"
          font-size="34" font-family="Arial">RCB</text>
  </g>

  <!-- Player 3 -->
  <g transform="translate(740,170)">
    <circle cx="0" cy="0" r="40" fill="#f1c27d"/>
    <rect x="-45" y="45" width="90" height="130" rx="12" fill="url(#jersey)"/>
    <line x1="-45" y1="70" x2="-100" y2="120" stroke="#f1c27d" stroke-width="14"/>
    <line x1="45" y1="70" x2="95" y2="135" stroke="#f1c27d" stroke-width="14"/>
    <line x1="-20" y1="175" x2="-30" y2="260" stroke="#f1c27d" stroke-width="16"/>
    <line x1="20" y1="175" x2="30" y2="260" stroke="#f1c27d" stroke-width="16"/>
    <text x="0" y="125" text-anchor="middle" fill="#ffd700"
          font-size="28" font-family="Arial">07</text>
  </g>

  <!-- Motto -->
  <text x="500" y="560"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="42"
        font-weight="bold"
        fill="#ffd700">
    PLAY BOLD
  </text>
</svg>
</body>
</html>
