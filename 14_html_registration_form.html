<!DOCTYPE html> 
<html> 
    <head>   
          <title>Registration form</title>
         </head> 
         <body>
              <h2>Registration Form</h2>
                <form>  
                        
                            
                            <label for="name">Name:</label>
                             <input type="text" name="name" id="#" placeholder="Enter Your Name"> <br><br>
                             

                                <label for="email">email:</label>
                             <input type="text" name="email" id="#" placeholder="Enter Your email"> <br><br>
  
                                                <label for="mobile number">mobile number:</label>
                             <input type="text" name="mobile number" id="#" placeholder="Enter Your mobile number"> <br><br>

                             

                                                          
                                                             <label for="password">password:</label>
                             <input type="text" name="password" id="#" placeholder="Enter Your password"> <br><br>

                                                             
                                                             <label for="confirm password">confirm password:</label>
                             <input type="text" name="confirm password" id="#" placeholder="Enter Your confirm password"> <br><br>

                             <label for="address">address:</label>
                             <input type="text" name="address" id="#" placeholder="Enter Your address"> <br><br>

                                                             

                                                              <input type="submit" value="Register"> 
                                                             <input type="reset" value="Reset">
                                                                      </form> 
                                                                                                                    
                                                                   </body> 
                                                                         </html>
