<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag
    </title>
</head>
<body>

    <table border="1" cellpadding="15" cellspacing="0">
        <thead>
            <tr>
                <th>subject</th>
                <th>obtained</th>
                <th>out of marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>marathi</td>
                <td>89</td>
                <td>100</td>
            </tr>
            <tr>
                <td>hindi</td>
                <td>91</td>
                <td>100</td>
            </tr>
            <tr>
                <td>english</td>
                <td>85</td>
                <td>100</td>
            </tr>
            <tr>
                <td>maths</td>
                <td>82</td>
                <td>100</td>
            </tr>
            <tr>
                <td>science</td>
                <td>78</td>
                <td>100</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">percentage</td>
                <td>84.00</td>
            </tr>
        </tfoot>
    </table>
    
</body>
</html>
