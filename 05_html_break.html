<!DOCTYPE html>
<html>
<head>
    <title>My Simple Page</title>
</head>
<body>

    <!-- 1. Using <p> tags creates a big space between blocks -->
    <p>This is my first paragraph of text.</p>
    
    <p>This is my second paragraph. Notice the blank space above me.</p>

    <!-- 2. Using <br> tags breaks lines without adding blank space -->
    <p>
        John Doe<br>
        123 Fake Street<br>
        New York, NY 10001
    </p>

</body>
</html>
